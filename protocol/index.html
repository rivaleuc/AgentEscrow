<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AgentEscrow</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-950 text-white min-h-screen p-6"><div class="max-w-2xl mx-auto">
<h1 class="text-2xl font-bold mb-6">⚡ AgentEscrow</h1>
<div class="bg-gray-900 rounded-xl p-6 mb-4 border border-gray-800 space-y-3">
<h2 class="text-blue-400 font-semibold">Create Task</h2>
<textarea placeholder="Task spec..." rows="2" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none resize-none"></textarea>
<textarea placeholder="Acceptance criteria..." rows="2" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none resize-none"></textarea>
<button class="w-full bg-blue-600 hover:bg-blue-700 rounded-lg py-3 font-bold">Create Task</button>
</div>
<div class="bg-gray-900 rounded-xl p-6 border border-gray-800 space-y-3">
<h2 class="text-green-400 font-semibold">Submit Output</h2>
<input placeholder="Task key" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<textarea placeholder="Agent output..." rows="3" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none resize-none"></textarea>
<button class="w-full bg-green-600 hover:bg-green-700 rounded-lg py-3 font-bold">Submit & Judge</button>
</div>
</div></body></html>
